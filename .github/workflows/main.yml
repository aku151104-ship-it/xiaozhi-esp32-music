name: Build bread-compact-wifi-s3cam

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ESP-IDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Clone ESP-IDF
        run: |
          git clone --depth 1 --branch v5.4.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          ./install.sh esp32s3

      - name: Build firmware
        run: |
          . ~/esp-idf/export.sh
          echo 'CONFIG_BOARD_TYPE_BREAD_COMPACT_WIFI_CAM=y' >> sdkconfig.defaults
          idf.py set-target esp32s3
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3" build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-music-bread-compact-wifi-s3cam
          path: |
            build/xiaozhi.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
          retention-days: 30
