name: Build bread-compact-wifi-s3cam

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ESP-IDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Clone ESP-IDF
        run: |
          git clone --depth 1 --branch v5.4.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          ./install.sh esp32s3

      - name: Build firmware
        run: |
          . ~/esp-idf/export.sh
          echo 'CONFIG_BOARD_TYPE_BREAD_COMPACT_WIFI_CAM=y' >> sdkconfig.defaults
          echo 'CONFIG_LCD_ST7789_240X320=y' >> sdkconfig.defaults
          echo 'CONFIG_USE_AFE_WAKE_WORD=y' >> sdkconfig.defaults
          idf.py set-target esp32s3
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3" build
          echo "=== All bin files ==="
          find build -name "*.bin" | sort | xargs ls -lh 2>/dev/null || true

      - name: Merge binaries
        run: |
          . ~/esp-idf/export.sh
          cd build
          echo "=== Merging with esptool ==="
          # 用 esptool write_flash_args 找到正确的地址
          python -m esptool --chip esp32s3 merge_bin             --output merged-binary.bin             --flash_mode dio             --flash_freq 80m             --flash_size 16MB             0x0    bootloader/bootloader.bin             0x8000 partition_table/partition-table.bin             0xd000 ota_data_initial.bin             0x10000 srmodels/srmodels.bin             0x100000 xiaozhi.bin ||           python -m esptool --chip esp32s3 merge_bin             --output merged-binary.bin             --flash_mode dio             --flash_freq 80m             --flash_size 16MB             0x0    bootloader/bootloader.bin             0x8000 partition_table/partition-table.bin             0xd000 ota_data_initial.bin             0x100000 xiaozhi.bin
          echo "=== Merged binary size ==="
          ls -lh merged-binary.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-music-bread-compact-wifi-s3cam
          path: build/merged-binary.bin
          retention-days: 30
