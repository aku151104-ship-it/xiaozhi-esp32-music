name: Build bread-compact-wifi-s3cam

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ESP-IDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Clone ESP-IDF
        run: |
          git clone --depth 1 --branch v5.4.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          ./install.sh esp32s3

      - name: Build firmware
        run: |
          . ~/esp-idf/export.sh
          echo 'CONFIG_BOARD_TYPE_BREAD_COMPACT_WIFI_CAM=y' >> sdkconfig.defaults
          echo 'CONFIG_LCD_ST7789_240X320=y' >> sdkconfig.defaults
          echo 'CONFIG_USE_AFE_WAKE_WORD=y' >> sdkconfig.defaults
          idf.py set-target esp32s3
          idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3" build
          echo "=== Build output files ==="
          ls -lh build/*.bin build/bootloader/*.bin build/partition_table/*.bin build/srmodels/ 2>/dev/null || true
          echo "=== flash_args ==="
          cat build/flash_args 2>/dev/null || true

      - name: Merge binaries
        run: |
          . ~/esp-idf/export.sh
          cd build
          echo "=== Using flash_args for merge ==="
          cat flash_args
          # 用 esptool merge_bin 配合 @flash_args 自动处理所有地址
          python -m esptool --chip esp32s3 merge_bin --output merged-binary.bin @flash_args
          echo "=== Merged binary size ==="
          ls -lh merged-binary.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-music-bread-compact-wifi-s3cam
          path: build/merged-binary.bin
          retention-days: 30
